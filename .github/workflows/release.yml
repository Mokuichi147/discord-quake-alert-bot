name: Release

# v* のタグを push すると、各プラットフォーム向けにビルドして
# GitHub Release にバイナリ（アーカイブ）を添付します。
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          dist="quake-alert-bot-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$dist"
          cp "target/${{ matrix.target }}/release/quake-alert-bot" "$dist/"
          cp README.md LICENSE "$dist/"
          tar -czf "$dist.tar.gz" "$dist"
          echo "ASSET=$dist.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          dist="quake-alert-bot-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$dist"
          cp "target/${{ matrix.target }}/release/quake-alert-bot.exe" "$dist/"
          cp README.md LICENSE "$dist/"
          7z a "$dist.zip" "$dist"
          echo "ASSET=$dist.zip" >> "$GITHUB_ENV"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
